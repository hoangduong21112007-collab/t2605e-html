<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employment Separation Form</title>
    <link rel="stylesheet" href="bt3.css">
</head>
<body>

    <div class="form-container">
        <div class="form-header">
            <h2>Employment Separation Form</h2>
        </div>

        <form class="form-body">
            
            <div class="form-group">
                <label class="main-label">Full Name</label>
            </div>
                <div class="row"></div>
                    <div class="col">
                        <input type="text" placeholder="First Name">
                        <span class="sub-label">First Name</span>
                    </div>
                    <div class="col">
                        <input type="text" placeholder="Last Name">
                        <span class="sub-label">Last Name</span>
                    </div>                            
            <div class="form-group">
                <label class="main-label">Employee ID</label>
                <input type="text">
            </div>

            <div class="form-group">
                <label class="main-label">Personal Email</label>
                <input type="email">
            </div>

            <div class="form-group">
                <label class="main-label">Last Working Date</label>
                <input type="text" placeholder="dd-MMM-yyyy">
            </div>

            <div class="form-group">
                <label class="main-label">Reason for Departure</label>
                <input type="text">
            </div>

            <div class="form-group">
                <label class="main-label">Return of All Company Property</label>
                <div class="radio-option">
                    <input type="radio" name="property" value="yes"> Yes
                </div>
                <div class="radio-option">
                    <input type="radio" name="property" value="no"> No
                </div>
                <div class="radio-option">
                    <input type="radio" name="property" value="other"> Other
                </div>
            </div>

            <div class="form-group">
                <label class="main-label">Exit Interview Schedule</label>
                <input type="text" placeholder="dd-MMM-yyyy HH:mm AM/PM">
            </div>

            <div class="form-group">
                <label class="main-label">Comments/ Feedback</label>
                <textarea rows="4"></textarea>
            </div>

            <div class="form-actions">
                <button type="submit">Submit</button>
            </div>

        </form>
    </div>

</body>
</html>
