<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo 1 T2605E</title>
    <link rel="stylesheet" href="css/layout.css"/>
</head>
<body>
    <section class="section banner-slide">
        <div class="container">
            <form method="get" action="#">
        </div>
    </section>
<div class="form-group">
        <label>Enter your DOB</label>
        <input name="dob" type="date" placeholder="Enter your DOB"/>
    </div>
    <div class="form-group">
        <label>Gender</label>
        <label><input name="gender" type="radio" value="male"/> Male</label>
        <label><input name="gender" type="radio" value="female"/> Female</label>
    </div>
    <div class="form-group">
       <label><input name="send_email" type="checkbox" value="yes"/> 
        Send me email</label>
    </div>
    <div class="form-group">
        <label>City</label>
        <select name="your_city">
            <option value="hcm">HCM</option>
            <option value="hn">HN</option>
            <option value="dn">DN</option>
        </select>
    </div>
    <div class="form-group">
        <label>Content</label>
        <textarea name="your_profile" rows="4">
        </textarea>
    </div>
    <div class="form-group">
        <button type="submit" value="save">Save</button>
        <button type="submit" value="save_draft">Save Draft</button>
        <button type="button">Button X</Button>
        <button type="reset">Reset form</button>
    </div>
